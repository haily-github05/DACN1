<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Vi Phạm | Traffic AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        :root{
            --primary:#2563eb;
            --primary-dark:#1d4ed8;
            --bg:#f1f5f9;
            --white:#ffffff;
            --text:#0f172a;
            --muted:#64748b;
            --border:#e2e8f0;
            --success:#16a34a;
            --warning:#f59e0b;
            --danger:#dc2626;
            --shadow:0 10px 30px rgba(0,0,0,0.08);
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:var(--bg);
            color:var(--text);
            padding:40px 20px;
        }

        .container{
            max-width:1200px;
            margin:auto;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
        }

        .title h1{
            font-size:28px;
            font-weight:700;
        }

        .title p{
            color:var(--muted);
            margin-top:6px;
        }

        .btn-back{
            border:none;
            background:var(--primary);
            color:white;
            padding:12px 18px;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
            transition:0.2s;
        }

        .btn-back:hover{
            background:var(--primary-dark);
        }

        .card{
            background:var(--white);
            border-radius:22px;
            overflow:hidden;
            box-shadow:var(--shadow);
            border:1px solid var(--border);
        }

        .card-header{
            padding:25px 30px;
            border-bottom:1px solid var(--border);
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#fafafa;
        }

        .case-id{
            font-size:22px;
            font-weight:700;
        }

        .badge{
            padding:10px 18px;
            border-radius:999px;
            font-size:14px;
            font-weight:600;
        }

        .badge-pending{
            background:#fef3c7;
            color:#92400e;
        }

        .badge-approved{
            background:#dcfce7;
            color:#166534;
        }

        .badge-rejected{
            background:#fee2e2;
            color:#991b1b;
        }

        .content{
            display:grid;
            grid-template-columns:1.1fr 1fr;
            gap:30px;
            padding:30px;
        }

        @media(max-width:900px){
            .content{
                grid-template-columns:1fr;
            }
        }

        .section-title{
            font-size:18px;
            font-weight:700;
            margin-bottom:20px;
        }

        .info-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:18px;
        }

        @media(max-width:600px){
            .info-grid{
                grid-template-columns:1fr;
            }
        }

        .info-card{
            background:#f8fafc;
            border:1px solid #edf2f7;
            border-radius:16px;
            padding:18px;
        }

        .label{
            font-size:12px;
            text-transform:uppercase;
            letter-spacing:0.5px;
            color:var(--muted);
            font-weight:600;
            margin-bottom:8px;
        }

        .value{
            font-size:16px;
            font-weight:600;
            word-break:break-word;
        }

        .plate{
            font-size:22px;
            font-weight:700;
            letter-spacing:2px;
            color:var(--primary);
        }

        .image-box{
            position:relative;
        }

        .image-box img{
            width:100%;
            border-radius:20px;
            border:1px solid var(--border);
            box-shadow:0 8px 20px rgba(0,0,0,0.1);
            object-fit:cover;
            max-height:520px;
        }

        .footer{
            padding:25px 30px;
            border-top:1px solid var(--border);
            display:flex;
            justify-content:flex-end;
            gap:12px;
            background:#fafafa;
        }

        .btn{
            border:none;
            padding:12px 18px;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            transition:0.2s;
        }

        .btn-primary{
            background:var(--primary);
            color:white;
        }

        .btn-primary:hover{
            background:var(--primary-dark);
        }

        .loading{
            text-align:center;
            padding:60px;
            color:var(--muted);
        }
        .badge-verified{
            background:#dcfce7;
            color:#166534;
        }
        .badge-rejected {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="topbar">

        <div class="title">
            <h1>🚦 Chi tiết hồ sơ vi phạm</h1>
            <p>Thông tin được đồng bộ trực tiếp từ hệ thống Traffic AI</p>
        </div>

        <button class="btn-back" onclick="goBack()">
            Quay lại
        </button>

    </div>

    <div class="card">

        <div class="card-header">

            <div class="case-id">
                MÃ HỒ SƠ: <span id="caseId">---</span>
            </div>

            <div id="statusBadge"></div>

        </div>

        <div class="content">

            <!-- LEFT -->
            <div>

                <div class="section-title">
                    📄 Thông tin vi phạm
                </div>

                <div class="info-grid">

                    <div class="info-card">
                        <div class="label">Biển số xe</div>
                        <div class="value plate" id="plate">---</div>
                    </div>

                    <div class="info-card">
                        <div class="label">Loại xe</div>
                        <div class="value" id="vehicleType">---</div>
                    </div>

                    <div class="info-card">
                        <div class="label">Loại vi phạm</div>
                        <div class="value" id="violationType">---</div>
                    </div>

                    <div class="info-card">
                        <div class="label">Thời gian ghi nhận</div>
                        <div class="value" id="time">---</div>
                    </div>

                    <div class="info-card">
                        <div class="label">Camera</div>
                        <div class="value" id="cameraName">---</div>
                    </div>

                    <div class="info-card">
                        <div class="label">Vị trí camera</div>
                        <div class="value" id="cameraLocation">---</div>
                    </div>

                </div>

            </div>

            <!-- RIGHT -->
            <div>

                <div class="section-title">
                    📸 Hình ảnh bằng chứng
                </div>

                <div class="image-box">
                    <img
                        id="evidenceImage"
                        src="https://via.placeholder.com/700x500?text=No+Image"
                    >
                </div>

            </div>

        </div>
    </div>

</div>

<script>

const BASE_URL =
    "http://127.0.0.1:5000";

const params =
    new URLSearchParams(window.location.search);

const id =
    params.get("id");

function formatTime(gmtTime) {

    if (!gmtTime) return "---";

    const date =
        new Date(gmtTime);

    const day =
        String(date.getUTCDate()).padStart(2, "0");

    const month =
        String(date.getUTCMonth() + 1).padStart(2, "0");

    const year =
        date.getUTCFullYear();

    const hours =
        String(date.getUTCHours()).padStart(2, "0");

    const minutes =
        String(date.getUTCMinutes()).padStart(2, "0");

    const seconds =
        String(date.getUTCSeconds()).padStart(2, "0");

    return `${hours}:${minutes}:${seconds} - ${day}/${month}/${year}`;
}

async function loadDetail() {

    if (!id) return;

    try {

        const res =
            await fetch(`${BASE_URL}/api/violations/${id}`);

        const v =
            await res.json();

        console.log(v);

        document.getElementById("caseId").innerText =
            v.id || "---";

        document.getElementById("plate").innerText =
            v.plate || "Không xác định";

        document.getElementById("vehicleType").innerText =
            v.vehicle_type || "Không rõ";

        document.getElementById("violationType").innerText =
            v.type || "Không rõ";

        document.getElementById("time").innerText =
            formatTime(v.time || v.created_at);

        document.getElementById("cameraName").innerText =
            v.camera_name || "Camera AI";

        document.getElementById("cameraLocation").innerText =
            v.camera_location || "Không xác định";

        // STATUS
        const status =
            (v.status || "").toLowerCase();

        let badgeClass =
            "badge-pending";

        let badgeText =
            "Chờ xử lý";

        if (status === "verified") {

            badgeClass =
                "badge-verified";

            badgeText =
                "Đã xác minh";
        }

        else if (status === "rejected") {

            badgeClass =
                "badge-rejected";

            badgeText =
                "Đã từ chối";
        }

        else if (status === "pending") {

            badgeClass =
                "badge-pending";

            badgeText =
                "Chờ xử lý";
        }

        document.getElementById("statusBadge").innerHTML = `
            <span class="badge ${badgeClass}">
                ${badgeText}
            </span>
        `;

        // IMAGE
        const image =
            document.getElementById("evidenceImage");

        if (v.image) {

            const cleanPath =
                v.image.startsWith("/")
                ? v.image
                : `/evidences/${v.image}`;

            image.src =
                BASE_URL + cleanPath;

        } else {

            image.src =
                "https://via.placeholder.com/700x500?text=No+Image";
        }

    } catch (err) {

        console.error(err);

        alert("❌ Không tải được dữ liệu!");
    }
}

function goBack() {

    window.history.back();
}

loadDetail();

</script>

</body>
</html>
