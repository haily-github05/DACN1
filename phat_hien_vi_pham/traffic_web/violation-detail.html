<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Tra cứu Vi phạm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main);
        }

        .card {
            background: var(--white);
            max-width: 850px;
            margin: auto;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .card-header {
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
            border-bottom: 1px solid #f1f5f9;
        }

        .card-body {
            padding: 32px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .card-body { grid-template-columns: 1fr; }
        }

        .info-group {
            margin-bottom: 16px;
        }

        .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        .value {
            font-size: 1.05rem;
            margin-top: 4px;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-paid {
            background: #dcfce7;
            color: #166534;
        }

        .image-container img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card-footer {
            padding: 20px 32px;
            background: #f8fafc;
            border-top: 1px solid #f1f5f9;
        }

        .btn {
            padding: 10px 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="card-header">
        <h2>Chi tiết vi phạm</h2>
        <div id="status-badge"></div>
    </div>

    <div class="card-body">
        <div>
            <div class="info-group">
                <div class="label">Mã biên bản</div>
                <div class="value" id="id">---</div>
            </div>

            <div class="info-group">
                <div class="label">Biển số</div>
                <div class="value" id="plate">---</div>
            </div>

            <div class="info-group">
                <div class="label">Loại vi phạm</div>
                <div class="value" id="type">---</div>
            </div>

            <div class="info-group">
                <div class="label">Thời gian</div>
                <div class="value" id="time">---</div>
            </div>

            <div class="info-group">
                <div class="label">Camera</div>
                <div class="value" id="camera">---</div>
            </div>
        </div>

        <div class="image-container">
            <img id="image" src="https://via.placeholder.com/400x300?text=No+Image" />
        </div>
    </div>

    <div class="card-footer">
        <button class="btn" onclick="goBack()">Quay lại</button>
    </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const BASE_URL = "http://127.0.0.1:5000";

function formatTime(t) {
    if (!t) return "-";
    const d = new Date(t);
    return d.toLocaleString("vi-VN");
}

async function loadDetail() {
    if (!id) return;

    try {
        const res = await fetch(`${BASE_URL}/api/violations/${id}`);
        const v = await res.json();

        document.getElementById("id").innerText = v.id ?? "-";
        document.getElementById("plate").innerText = v.plate ?? "-";
        document.getElementById("type").innerText = v.type ?? "-";
        document.getElementById("time").innerText = formatTime(v.time);
        document.getElementById("camera").innerText = v.camera ?? "Camera 01";

        // status badge
        const badge = document.getElementById("status-badge");
        const status = (v.status || "pending").toLowerCase();

        badge.innerHTML = `
            <span class="badge ${
                status.includes("đã") ? "status-paid" : "status-pending"
            }">
                ${v.status || "Chưa xử lý"}
            </span>
        `;

        // IMAGE FIX CHUẨN
        const img = document.getElementById("image");

        if (v.image) {
            // đảm bảo không bị // hoặc thiếu /
            const cleanPath = v.image.startsWith("/")
                ? v.image
                : "/evidences/" + v.image;

            img.src = BASE_URL + cleanPath;
        } else {
            img.src = "https://via.placeholder.com/400x300?text=No+Image";
        }

    } catch (err) {
        console.error(err);
        alert("Không load được dữ liệu!");
    }
}

function goBack() {
    window.history.back();
}

loadDetail();
</script>

</body>
</html>
