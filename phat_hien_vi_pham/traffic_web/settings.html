<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Cài đặt hệ thống</title>

<style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --sidebar-color: #1e293b;
            --text-main: #1e293b;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f7fb;
            display: flex;
        }

/* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: var(--sidebar-color);
            height: 100vh;
            color: white;
            position: fixed;
            padding: 20px 0;
        }

        .sidebar h2 {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #38bdf8;
            letter-spacing: 1px;
        }
        .sidebar a {
            display: block;
            color: #cbd5e1;
            padding: 12px 25px;
            text-decoration: none;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
            border-left: 4px solid var(--primary-color);
        }
        /* ===== MAIN ===== */
        .main {
            margin-left: 260px;
            padding: 20px;
            width: 100%;
        }

        h1 {
            margin-bottom: 20px;
        }

        /* ===== GRID ===== */
        .settings-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* ===== CARD ===== */
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* ===== FORM ===== */
        label {
            font-size: 13px;
            color: #555;
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        /* ===== SWITCH ===== */
        .switch {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .switch input {
            width: auto;
        }

        /* ===== BUTTON ===== */
        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🚦 Traffic System</h2>
    <a href="index.html">📊 Tổng quan</a>
    <a href="camera.html">📹 Giám sát</a>
    <a href="violations.html">🚫 Hồ sơ vi phạm</a>
    <a href="reports.html">📈 Báo cáo</a>
    <a href="settings.html">⚙️ Cài đặt</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>⚙️ Cài đặt hệ thống</h1>

<div class="settings-container">

    <!-- AI CONFIG -->
    <div class="card">
        <h3>🚨 Cài đặt AI phát hiện</h3>

        <label>Ngưỡng phát hiện (Confidence)</label>
        <input id="confidence" type="number" step="0.1" min="0" max="1" value="0.5">

        <div class="switch">
            <span>Bật tự động phát hiện</span>
            <input id="autoDetect" type="checkbox" checked>
        </div>

        <button onclick="saveSettings()">Lưu cài đặt AI</button>
    </div>

    <!-- CAMERA -->
    <div class="card">
        <h3>📹 Cài đặt camera</h3>

        <label>Địa chỉ IP camera</label>
        <input type="text" placeholder="192.168.1.10">

        <label>Số lượng camera</label>
        <input type="number" value="4">

        <button>Lưu camera</button>
    </div>

    <!-- NOTIFICATION -->
    <div class="card">
        <h3>🔔 Thông báo hệ thống</h3>

        <div class="switch">
            <span>Email cảnh báo</span>
            <input id="emailAlert" type="checkbox" checked>
        </div>

        <div class="switch">
            <span>SMS cảnh báo</span>
            <input id="smsAlert" type="checkbox">
        </div>

        <div class="switch">
            <span>Thông báo realtime</span>
            <input id="popupAlert" type="checkbox" checked>
        </div>

        <button onclick="saveSettings()">Lưu thông báo</button>
    </div>

    <!-- DATABASE -->
    <div class="card">
        <h3>🗄 Hệ thống dữ liệu</h3>

        <label>Database URL</label>
        <input type="text" value="127.0.0.1:5000">

        <div class="switch">
            <span>Xóa log cũ</span>
            <input type="checkbox">
        </div>

        <button>Lưu hệ thống</button>
    </div>

</div>

</div>

<!-- JS -->
<script>
/* =======================
   LOAD SETTINGS FROM API
======================= */
async function loadSettings() {
    try {
        const res = await fetch("http://127.0.0.1:5000/api/settings");
        const data = await res.json();

        document.getElementById("confidence").value = data.confidence || 0.5;
        document.getElementById("autoDetect").checked = data.auto_detect == "1";

        document.getElementById("emailAlert").checked = data.email_alert == "1";
        document.getElementById("smsAlert").checked = data.sms_alert == "1";
        document.getElementById("popupAlert").checked = data.popup_alert == "1";

    } catch (err) {
        console.error("Load settings error:", err);
    }
}

/* =======================
   SAVE SETTINGS TO API
======================= */
async function saveSettings() {

    const data = {
        confidence: document.getElementById("confidence").value,
        auto_detect: document.getElementById("autoDetect").checked ? 1 : 0,
        email_alert: document.getElementById("emailAlert").checked ? 1 : 0,
        sms_alert: document.getElementById("smsAlert").checked ? 1 : 0,
        popup_alert: document.getElementById("popupAlert").checked ? 1 : 0
    };

    try {
        const res = await fetch("http://127.0.0.1:5000/api/settings", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();
        alert(result.message);

    } catch (err) {
        console.error("Save settings error:", err);
    }
}

/* INIT */
document.addEventListener("DOMContentLoaded", loadSettings);
</script>

</body>
</html>
