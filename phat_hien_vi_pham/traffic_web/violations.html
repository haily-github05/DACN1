<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hồ Sơ Vi Phạm | Traffic AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>

        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --sidebar-color: #1e293b;
            --text-main: #1e293b;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: "Inter", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            color: var(--text-main);
        }

        /* SIDEBAR */

        .sidebar {
            width: 260px;
            background: var(--sidebar-color);
            height: 100vh;
            color: white;
            position: fixed;
            padding: 20px 0;
        }

        .sidebar h2 {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            padding: 12px 25px;
            text-decoration: none;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
            border-left: 4px solid var(--primary-color);
        }

        /* MAIN */

        .main {
            margin-left: 260px;
            padding: 30px;
            width: calc(100% - 260px);
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* FILTER */

        .filter-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
        }

        input,
        select {
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }

        .btn-search {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-search:hover {
            background: #1d4ed8;
        }

        /* TABLE */

        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            color: #64748b;
            padding: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 2px solid #edf2f7;
            text-align: center;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            text-align: center;
            vertical-align: middle;
            font-size: 0.9rem;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        /* BADGE */

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .badge-success {
            background: #dcfce7;
            color: #166534;
        }

        .badge-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        /* BUTTON */

        .btn-action {
            background: #f1f5f9;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-action:hover {
            background: #e2e8f0;
        }

        /* MODAL */

        #previewModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 12px;
            max-height: 85vh;
            overflow: auto;
        }

    </style>
</head>

<body>
    <div class="sidebar">
        <h2>🚦 Traffic System</h2>
        <a href="index.html">📊 Tổng quan</a>
        <a href="camera.html">📹 Giám sát</a>
        <a href="violations.html">🚫 Hồ sơ vi phạm</a>
        <a href="reports.html">📈 Báo cáo & thống kê</a>
    </div>

    <div class="main">
        <div class="header-flex">
            <h1>🚫 Quản lý hồ sơ vi phạm</h1>
            <button class="btn-search" style="background:#10b981" onclick="openPreview()">
                ⬇ Xuất báo cáo Excel
            </button>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label>Tìm kiếm biển số</label>
                <input type="text" id="searchPlate" placeholder="VD: 29A-12345"/>
            </div>

            <div class="filter-group">
                <label>Loại vi phạm</label>
                <select id="filterType">
                    <option value="all">Tất cả lỗi</option>
                    <option value="red_light">Vượt đèn đỏ</option>
                    <option value="no_helmet">Không đội mũ</option>
                    <option value="wrong_lane">Sai làn</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Loại xe</label>
                <select id="filterVehicle">
                    <option value="all">Tất cả xe</option>
                    <option value="car">Ô tô</option>
                    <option value="motobike">Xe máy</option>
                    <option value="truck">Xe tải</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Trạng thái</label>
                <select id="filterStatus">
                    <option value="all">Tất cả trạng thái</option>
                    <option value="pending">Chờ xử Đã xác minh</option>
                    <option value="rejected">Đã từ chối</option>
                </select>
            </div>

        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Loại xe</th>
                        <th>Camera</th>
                        <th>Biển số</th>
                        <th>Loại vi phạm</th>
                        <th>Thời gian</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="violationBody"></tbody>
            </table>
        </div>

    </div>

    <div id="previewModal">

        <div class="modal-content">
            <h2>📊 Xem trước báo cáo</h2>
            <table border="1">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Biển số</th>
                        <th>Loại xe</th>
                        <th>Loại vi phạm</th>
                        <th>Camera</th>
                        <th>Thời gian</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="previewBody"></tbody>
            </table>
            <br>

            <button class="btn-search"onclick="exportExcel()">
                ⬇ Xuất Excel
            </button>

            <button class="btn-search" style="background:#ef4444"onclick="closePreview()">
                ❌ Đóng
            </button>

        </div>

    </div>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        loadViolations();
        document.getElementById("searchPlate").addEventListener("input", loadViolations);
        document.getElementById("filterType").addEventListener("change", loadViolations);
        document.getElementById("filterVehicle").addEventListener("change", loadViolations);
        document.getElementById("filterStatus").addEventListener("change", loadViolations);
        setInterval(loadViolations, 5000);

    });

    function formatTime(gmtTime) {

        if (!gmtTime) return "-";
        const date = new Date(gmtTime);
        const day = String(date.getUTCDate()).padStart(2, "0");
        const month = String(date.getUTCMonth() + 1).padStart(2, "0");
        const year = date.getUTCFullYear();
        const hours = String(date.getUTCHours()).padStart(2, "0");
        const minutes = String(date.getUTCMinutes()).padStart(2, "0");
        const seconds = String(date.getUTCSeconds()).padStart(2, "0");

        return `
            <div style="line-height:1.4">
                <b>${hours}:${minutes}:${seconds}</b>
                <br>
                <small style="color:gray">
                    ${day}/${month}/${year}
                </small>
            </div>
        `;
    }

    async function loadViolations() {

        try {

            const res = await fetch("http://127.0.0.1:5000/api/violations");
            const data = await res.json();
            const plateSearch = document.getElementById("searchPlate").value.trim().toLowerCase();
            const typeFilter = document.getElementById("filterType").value;
            const vehicleFilter = document.getElementById("filterVehicle").value;
            const statusFilter = document.getElementById("filterStatus").value;
            const filtered =
                data.filter(v => {

                    const plate =
                        (v.plate || "")
                        .toLowerCase();

                    const type =
                        (v.type || "")
                        .toLowerCase();

                    const vehicle =
                        (v.vehicle_type || "")
                        .toLowerCase();

                    const status =
                        (v.status || "")
                        .toLowerCase();

                    const matchPlate =
                        plate.includes(plateSearch);

                    // TYPE

                    const matchType =

                        typeFilter === "all" ||

                        (
                            typeFilter === "red_light" &&
                            (
                                type.includes("red") ||
                                type.includes("đèn đỏ")
                            )
                        ) ||

                        (
                            typeFilter === "no_helmet" &&
                            (
                                type.includes("helmet") ||
                                type.includes("mũ")
                            )
                        ) ||

                        (
                            typeFilter === "wrong_lane" &&
                            (
                                type.includes("lane") ||
                                type.includes("làn")
                            )
                        );

                    // VEHICLE

                    const matchVehicle =

                        vehicleFilter === "all" ||

                        (
                            vehicleFilter === "car" &&
                            (
                                vehicle.includes("car") ||
                                vehicle.includes("ô tô")
                            )
                        ) ||

                        (
                            vehicleFilter === "motobike" &&
                            vehicle.includes("xe máy")
                        ) ||

                        (
                            vehicleFilter === "truck" &&
                            vehicle.includes("xe tải")
                        );

                    // STATUS

                    const matchStatus =

                        statusFilter === "all" ||

                        (
                            statusFilter === "pending" &&
                            status === "pending"
                        ) ||

                        (
                            statusFilter === "verified" &&
                            status === "verified"
                        ) ||

                        (
                            statusFilter === "rejected" &&
                            status === "rejected"
                        );

                    return (
                        matchPlate &&
                        matchType &&
                        matchVehicle &&
                        matchStatus
                    );

                });

            filtered.sort((a, b) => {

                return (
                    new Date(
                        (b.time || "")
                        .replace(" ", "T")
                    ) -

                    new Date(
                        (a.time || "")
                        .replace(" ", "T")
                    )
                );

            });

            let html = "";

            if (filtered.length === 0) {
                html = `
                    <tr>
                        <td colspan="8" style=" padding:30px; color:gray;">
                            Không có dữ liệu
                        </td>
                    </tr>
                `;
            }

            else {

                filtered.forEach((v, index) => {

                    const status =
                        (v.status || "")
                        .toLowerCase();

                    let statusClass =
                        "badge-pending";

                    let statusText =
                        "Chờ xử lý";

                    if (status === "verified") {

                        statusClass =
                            "badge-success";

                        statusText =
                            "Đã xác minh";
                    }

                    if (status === "rejected") {

                        statusClass =
                            "badge-rejected";

                        statusText =
                            "Đã từ chối";
                    }

                    html += `
                        <tr>
                            <td>
                                <b>
                                    ${v.id ?? index + 1}
                                </b>
                            </td>
                            <td>
                                ${v.vehicle_type || "Không rõ"}
                            </td>
                            <td>
                                <div style="font-weight:600;color:#2563eb;">
                                    ${v.camera_name || "Không rõ"}
                                </div>
                                <small style="color:gray">
                                    ${v.camera_location || ""}
                                </small>
                            </td>
                            <td>
                                <code style="background:#e2e8f0;padding:4px 8px;border-radius:4px;">
                                    ${v.plate || "N/A"}
                                </code>
                            </td>
                            <td>
                                ${v.type || "N/A"}
                            </td>
                            <td>
                                ${formatTime(v.time || v.created_at)}
                            </td>
                            <td>
                                <span class="badge ${statusClass}">
                                    ${statusText}
                                </span>
                                <div style="display:flex;gap:6px;justify-content:center;margin-top:8px;">
                                    <button class="btn-action"style="background:#dcfce7;color:#166534;"onclick="verifyViolation(${v.id})">
                                        ✔ Xác minh
                                    </button>

                                    <button class="btn-action" style="background:#fee2e2;color:#991b1b;"onclick="rejectViolation(${v.id})">
                                        ✖ Từ chối
                                    </button>

                                </div>
                            </td>
                            <td>
                                <button class="btn-action"onclick="goDetail(${v.id})">
                                    Chi tiết
                                </button>
                            </td>
                        </tr>
                    `;

                });

            }
            document.getElementById("violationBody").innerHTML = html;
        }
        catch (err) {
            console.error(err);
        }
    }

    function goDetail(id) {
        window.location.href =`violation-detail.html?id=${id}`;
    }

    async function verifyViolation(id) {
        if (!confirm("Xác minh hồ sơ?"))
            return;
        const res = await fetch(`http://127.0.0.1:5000/api/violations/${id}/status`,
            {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    status: "verified"
                })
            }
        );

        const result = await res.json();

        if (result.success) {
            alert("✅ Đã xác minh");
            loadViolations();
        }
    }
    
    async function rejectViolation(id) {
        if (!confirm("Từ chối hồ sơ?"))
            return;
        const res = await fetch(`http://127.0.0.1:5000/api/violations/${id}/status`,
            {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    status: "rejected"
                })
            }
        );

        const result = await res.json();

        if (result.success) {
            alert("❌ Đã từ chối");
            loadViolations();
        }
    }

    function openPreview() {
        loadPreviewData();
        document.getElementById("previewModal").style.display = "block";
    }

    function closePreview() {
        document.getElementById("previewModal").style.display = "none";
    }

    async function getFilteredData() {
        const res =
            await fetch(
                "http://127.0.0.1:5000/api/violations"
            );
        const data =
            await res.json();
        return data;
    }

    async function loadPreviewData() {

        const filtered =
            await getFilteredData();

        const previewBody =
            document.getElementById("previewBody");

        if (filtered.length === 0) {

            previewBody.innerHTML = `
                <tr>

                    <td colspan="7">
                        Không có dữ liệu
                    </td>

                </tr>
            `;

            return;
        }

        previewBody.innerHTML =
            filtered.map((v, index) => {

                let statusText =
                    "Chờ xử lý";

                if ((v.status || "") === "verified") {
                    statusText = "Đã xác minh";
                }

                if ((v.status || "") === "rejected") {
                    statusText = "Đã từ chối";
                }

                return `
                    <tr>

                        <td>${v.id ?? index + 1}</td>

                        <td>${v.plate || "N/A"}</td>

                        <td>${v.vehicle_type || "Không rõ"}</td>

                        <td>${v.type || "N/A"}</td>

                        <td>${v.camera_name || "Không rõ"}</td>

                        <td>
                            ${formatExcelTime(v.time || v.created_at)}
                        </td>

                        <td>${statusText}</td>

                    </tr>
                `;

            }).join("");

    }

    async function exportExcel() {

        const filtered =
            await getFilteredData();

        if (filtered.length === 0) {

            alert("Không có dữ liệu!");

            return;

        }

        const exportData =
            filtered.map((v, index) => {

                let statusText =
                    "Chờ xử lý";

                if ((v.status || "") === "verified") {
                    statusText = "Đã xác minh";
                }

                if ((v.status || "") === "rejected") {
                    statusText = "Đã từ chối";
                }

                return {

                    "STT":
                        index + 1,

                    "Mã Hồ Sơ":
                        v.id || "N/A",

                    "Biển Số":
                        v.plate || "N/A",

                    "Loại Xe":
                        v.vehicle_type || "Không rõ",

                    "Loại Vi Phạm":
                        v.type || "N/A",

                    "Camera":
                        v.camera_name || "Không rõ",

                    "Vị Trí Camera":
                        v.camera_location || "Không rõ",

                    "Thời Gian":
                        formatExcelTime(
                            v.time || v.created_at
                        ),

                    "Trạng Thái":
                        statusText
                };

            });

        const worksheet =
            XLSX.utils.json_to_sheet(exportData);

        worksheet["!cols"] = [

            { wch: 8 },
            { wch: 12 },
            { wch: 18 },
            { wch: 18 },
            { wch: 28 },
            { wch: 22 },
            { wch: 28 },
            { wch: 24 },
            { wch: 18 }

        ];

        const workbook =
            XLSX.utils.book_new();

        XLSX.utils.book_append_sheet(
            workbook,
            worksheet,
            "Bao Cao Vi Pham"
        );

        const now =
            new Date();

        const fileName =
            `Bao_Cao_Vi_Pham_${now.getFullYear()}_${now.getMonth() + 1}_${now.getDate()}.xlsx`;

        XLSX.writeFile(
            workbook,
            fileName
        );

        closePreview();

        alert("✅ Xuất báo cáo thành công!");

    }

    function formatExcelTime(gmtTime) {

        if (!gmtTime)
            return "---";

        const date =
            new Date(gmtTime);

        const day =
            String(date.getUTCDate())
            .padStart(2, "0");

        const month =
            String(date.getUTCMonth() + 1)
            .padStart(2, "0");

        const year =
            date.getUTCFullYear();

        const hours =
            String(date.getUTCHours())
            .padStart(2, "0");

        const minutes =
            String(date.getUTCMinutes())
            .padStart(2, "0");

        const seconds =
            String(date.getUTCSeconds())
            .padStart(2, "0");

        return `${hours}:${minutes}:${seconds} ${day}/${month}/${year}`;

    }

</script>

</body>
</html>
