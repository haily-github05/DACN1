<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Vi Phạm | Traffic AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --sidebar-color: #1e293b;
            --text-main: #1e293b;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            color: var(--text-main);
        }

        /* Sidebar - Đồng bộ hệ thống */
        .sidebar {
            width: 260px;
            background: var(--sidebar-color);
            height: 100vh;
            color: white;
            position: fixed;
            padding: 20px 0;
        }

        .sidebar h2 {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            padding: 12px 25px;
            text-decoration: none;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
            border-left: 4px solid var(--primary-color);
        }

        /* Main Content */
        .main {
            margin-left: 260px;
            padding: 30px;
            width: calc(100% - 260px);
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Bộ lọc & Tìm kiếm */
        .filter-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
        }

        input, select {
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }

        .btn-search {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-search:hover { background: #1d4ed8; }

        /* Bảng hồ sơ */
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            color: #64748b;
            padding: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 2px solid #edf2f7;
            text-align: center;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            text-align: center;
            vertical-align: middle;
            font-size: 0.9rem;
        }

        tr:hover { background-color: #f8fafc; }

        /* Trạng thái */
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-pending { background: #fef9c3; color: #854d0e; }
        .badge-success { background: #dcfce7; color: #166534; }


        .btn-action {
            background: #f1f5f9;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-action:hover { background: #e2e8f0; }

    </style>
</head>
<body>

<div class="sidebar">
    <h2>🚦 Traffic System</h2>
    <a href="index.html">📊 Tổng quan</a>
    <a href="camera.html">📹 Giám sát</a>
    <a href="violations.html">🚫 Hồ sơ vi phạm</a>
    <a href="reports.html">📈 Báo cáo & thống kê</a>
</div>

<div class="main">
    <div class="header-flex">
        <h1>🚫 Quản lý hồ sơ vi phạm</h1>
        <button class="btn-search" style="background: #10b981;" onclick="openPreview()">+ Xuất báo cáo (Excel)</button>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <label>Tìm kiếm biển số</label>
            <input type="text" id="searchPlate" placeholder="VD: 29A-12345...">
        </div>
        <div class="filter-group">
            <label>Loại vi phạm</label>
            <select id="filterType">
                <option value="all">Tất cả loại lỗi</option>
                <option value="red_light">Vượt đèn đỏ</option>
                <option value="no_helmet">Không đội mũ bảo hiểm</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Loại xe</label>
            <select id="filterVehicle">
                <option value="all">Tất cả xe</option>
                <option value="car">Ô tô</option>
                <option value="motobike">Xe máy</option>
                <option value="truck">Xe tải</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Trạng thái</label>
            <select id="filterStatus">
                <option value="all">Tất cả trạng thái</option>
                <option value="pending">Chờ xử lý</option>
                <option value="verified">Đã xác minh</option>
            </select>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <th>ID</th>
                <th>Loại xe</th>
                <th>Camera</th>
                <th>Biển số</th>
                <th>Loại vi phạm</th>
                <th>Thời gian</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </thead>
            <tbody id="violationBody">
                </tbody>
        </table>
    </div>
</div>
<div id="previewModal" style="display:none;position:fixed; top:0; left:0; width:100%; height:100%;background:rgba(0,0,0,0.5);">
    <div style="background:white;width:80%;margin:50px auto;padding:20px;border-radius:10px;max-height:80%;overflow:auto;">
        <h2>📊 Xem trước báo cáo</h2>
        <table border="1" width="100%" style="border-collapse:collapse">
            <thead>
                    <tr>
                        <th>ID</th>
                        <th>Loại xe</th>
                        <th>Camera</th>
                        <th>Biển số</th>
                        <th>Loại vi phạm</th>
                        <th>Thời gian</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
            </thead>
            <tbody id="previewBody"></tbody>
        </table>
        <br>
        <br>
        <button onclick="exportExcel()">⬇ Xuất Excel</button>
        <button onclick="closePreview()">❌ Đóng</button>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
    loadViolations();

    document.getElementById("searchPlate").addEventListener("input", loadViolations);
    document.getElementById("filterType").addEventListener("change", loadViolations);
    document.getElementById("filterStatus").addEventListener("change", loadViolations);
    document.getElementById("filterVehicle").addEventListener("change", loadViolations);
    setInterval(loadViolations, 3000);
});
let autoReload;

document.addEventListener("DOMContentLoaded", () => {
    loadViolations();

    const search = document.getElementById("searchPlate");
    const type = document.getElementById("filterType");
    const status = document.getElementById("filterStatus");

    search.addEventListener("input", () => {
        clearInterval(autoReload);
        loadViolations();
    });

    type.addEventListener("change", loadViolations);
    status.addEventListener("change", loadViolations);

    autoReload = setInterval(loadViolations, 5000);
});
function formatTime(gmtTime) {

    if (!gmtTime) return "-";

    const date = new Date(gmtTime);

    const day =
        String(date.getUTCDate()).padStart(2, "0");

    const month =
        String(date.getUTCMonth() + 1).padStart(2, "0");

    const year =
        date.getUTCFullYear();

    const hours =
        String(date.getUTCHours()).padStart(2, "0");

    const minutes =
        String(date.getUTCMinutes()).padStart(2, "0");

    const seconds =
        String(date.getUTCSeconds()).padStart(2, "0");

    return `
        <div style="line-height:1.4">
            <b>${hours}:${minutes}:${seconds}</b><br>
            <small style="color:gray">
                ${day}/${month}/${year}
            </small>
        </div>
    `;
}
async function loadViolations() {
    try {
        const res = await fetch("http://127.0.0.1:5000/api/violations");
        let data = await res.json();

        const plateSearch = document.getElementById("searchPlate").value.trim().toLowerCase();
        const typeFilter = document.getElementById("filterType").value;
        const statusFilter = document.getElementById("filterStatus").value;
        const vehicleFilter = document.getElementById("filterVehicle").value; // ✅ FIX

        const filtered = data.filter(v => {
            const plate = (v.plate || "").toLowerCase();
            const type = (v.type || "").toLowerCase();
            const status = (v.status || "").toLowerCase();
            const vehicle = (v.vehicle_type || "").toLowerCase(); // ✅ FIX

            const matchPlate = plate.includes(plateSearch);

            const matchType = (() => {
                if (typeFilter === "all") return true;

                if (typeFilter === "red_light") {
                    return type.includes("red") || type.includes("đèn đỏ");
                }

                if (typeFilter === "no_helmet") {
                    return type.includes("helmet") || type.includes("mũ");
                }

                if (typeFilter === "wrong_lane") {
                    return type.includes("lane") || type.includes("làn");
                }

                return false;
            })();

            const matchVehicle = (() => {
                if (vehicleFilter === "all") return true;

                if (vehicleFilter === "car") return vehicle.includes("car") || vehicle.includes("ô tô");
                if (vehicleFilter === "motobike") return vehicle.includes("xe máy");
                if (vehicleFilter === "truck") return vehicle.includes("xe tải");

                return false;
            })();

            const matchStatus = (() => {
                if (statusFilter === "all") return true;

                if (statusFilter === "pending") {
                    return status === "pending" || status.includes("chờ");
                }

                if (statusFilter === "verified") {
                    return status === "verified" || status.includes("xác minh");
                }

                return false;
            })();

            return matchPlate && matchType && matchStatus && matchVehicle; // ✅ FIX
        });

        filtered.sort((a, b) => {
            return new Date((b.time || "").replace(" ", "T")) -
                   new Date((a.time || "").replace(" ", "T"));
        });

        let html = "";

        if (filtered.length === 0) {
            html = `
                <tr>
                    <td colspan="6" style="padding:20px; color:gray;">
                        Không tìm thấy kết quả phù hợp
                    </td>
                </tr>
            `;
        } else {
            filtered.forEach((v, index) => {

                const statusRaw = (v.status || "").toLowerCase();

                let statusClass = "badge-pending";
                let statusText = "Chờ xử lý";

                if (statusRaw.includes("verified") || statusRaw.includes("xác minh")) {
                    statusClass = "badge-success";
                    statusText = "Đã xác minh";
                } 

                html += `
                <tr>

                    <td><b>${v.id ?? index + 1}</b></td>

                    <td>
                        <span style="font-weight:600;">
                            ${v.vehicle_type || "Không rõ"}
                        </span>
                    </td>

                    <!-- CAMERA -->
                    <td>
                        <div style="font-weight:600;color:#2563eb">
                            ${v.camera_name || "Không rõ"}
                        </div>

                        <small style="color:gray">
                            ${v.camera_location || ""}
                        </small>
                    </td>

                    <!-- BIỂN SỐ -->
                    <td>
                        <code style="
                            background:#e2e8f0;
                            padding:4px 8px;
                            border-radius:4px;
                        ">
                            ${v.plate || "N/A"}
                        </code>
                    </td>

                    <td>${v.type || "N/A"}</td>

                    <td>${formatTime(v.time || v.created_at)}</td>

                    <td>
                        <span class="badge ${statusClass}">
                            ${statusText}
                        </span>
                    </td>

                    <td>
                        <button
                            class="btn-action"
                            onclick="goDetail(${v.id})"
                        >
                            Chi tiết
                        </button>
                    </td>

                </tr>
                `;
            });
        }

        document.getElementById("violationBody").innerHTML = html;

    } catch (err) {
        console.error("❌ API ERROR:", err);
    }
}

function viewDetail(id) {
    alert("Xem chi tiết vi phạm ID: " + id);
}
function goDetail(id) {
    window.location.href = `violation-detail.html?id=${id}`;
}
//Xuất file
function openPreview() {
    loadPreviewData();
    document.getElementById("previewModal").style.display = "block";
}

function closePreview() {
    document.getElementById("previewModal").style.display = "none";
}

async function getFilteredData() {
    try {
        const res = await fetch("http://127.0.0.1:5000/api/violations");
        const data = await res.json();

        const plateSearch = document.getElementById("searchPlate").value.trim().toLowerCase();
        const typeFilter = document.getElementById("filterType").value;
        const statusFilter = document.getElementById("filterStatus").value;

        return data.filter(v => {
            const plate = (v.plate || "").toLowerCase();
            const type = (v.type || "").toLowerCase();
            const status = (v.status || "").toLowerCase();

            const matchPlate = plate.includes(plateSearch);
            const matchType = (typeFilter === "all") ||
                (typeFilter === "red_light" && (type.includes("red") || type.includes("đèn đỏ"))) ||
                (typeFilter === "no_helmet" && (type.includes("helmet") || type.includes("mũ")));

            const matchStatus = (statusFilter === "all") ||
                (statusFilter === "pending" && (status === "pending" || status.includes("chờ"))) ||
                (statusFilter === "verified" && (status === "verified" || status.includes("xác minh")));

            return matchPlate && matchType && matchStatus;
        });
    } catch (err) {
        console.error("Lỗi lấy dữ liệu:", err);
        return [];
    }
}

async function loadPreviewData() {
    const filtered = await getFilteredData();
    const previewBody = document.getElementById("previewBody");
    
    if (filtered.length === 0) {
        previewBody.innerHTML = "<tr><td colspan='5'>Không có dữ liệu để xuất</td></tr>";
        return;
    }

    previewBody.innerHTML = filtered.map((v, index) => `
        <tr>
            <td>${v.id ?? index + 1}</td>

            <td>${v.plate || "N/A"}</td>

            <td>${v.type || "N/A"}</td>

            <td>${v.time || "---"}</td>

            <td>
                ${v.camera_name || "Không rõ"}
                <br>
                <small>${v.camera_location || ""}</small>
            </td>

            <td>
                ${(v.status || "").includes("verified")
                    ? "Đã xác minh"
                    : "Chờ xử lý"}
            </td>
        </tr>
    `).join('');
}

async function exportExcel() {
    const filtered = await getFilteredData();
    if (filtered.length === 0) return alert("Không có dữ liệu!");

    const exportData = filtered.map((v, index) => ({
        "STT": index + 1,
        "Mã Hồ Sơ": v.id || "N/A",
        "Biển Số Xe": v.plate || "N/A",
        "Loại Vi Phạm": v.type || "N/A",
        "Thời Gian Ghi Nhận": v.time || "---",
        "Trạng Thái Xử Lý": (v.status || "").includes("verified") ? "Đã xác minh" : "Chờ xử lý"
    }));

    const worksheet = XLSX.utils.json_to_sheet(exportData);

    const columnWidths = [
        { wch: 5 },  
        { wch: 10 }, 
        { wch: 15 },
        { wch: 25 }, 
        { wch: 20 },
        { wch: 15 }  
    ];
    worksheet['!cols'] = columnWidths;

    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Danh sach vi pham");
    
    const fileName = `Bao_cao_vi_pham_${new Date().getTime()}.xlsx`;
    XLSX.writeFile(workbook, fileName);
    
    closePreview();
}
</script>

</body>
</html>
