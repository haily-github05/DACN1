<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Vi Phạm | Traffic AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --sidebar-color: #1e293b;
            --text-main: #1e293b;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            color: var(--text-main);
        }

        /* Sidebar - Đồng bộ hệ thống */
        .sidebar {
            width: 260px;
            background: var(--sidebar-color);
            height: 100vh;
            color: white;
            position: fixed;
            padding: 20px 0;
        }

        .sidebar h2 {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            padding: 12px 25px;
            text-decoration: none;
            transition: 0.3s;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
            border-left: 4px solid var(--primary-color);
        }

        /* Main Content */
        .main {
            margin-left: 260px;
            padding: 30px;
            width: calc(100% - 260px);
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Bộ lọc & Tìm kiếm */
        .filter-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
        }

        input, select {
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }

        .btn-search {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-search:hover { background: #1d4ed8; }

        /* Bảng hồ sơ */
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8fafc;
            color: #64748b;
            padding: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 2px solid #edf2f7;
            text-align: center;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            text-align: center;
            vertical-align: middle;
            font-size: 0.9rem;
        }

        tr:hover { background-color: #f8fafc; }

        /* Trạng thái */
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-pending { background: #fef9c3; color: #854d0e; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-error { background: #fee2e2; color: #991b1b; }

        .btn-action {
            background: #f1f5f9;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-action:hover { background: #e2e8f0; }

    </style>
</head>
<body>

<div class="sidebar">
    <h2>🚦 Traffic System</h2>
    <a href="index.html">📊 Tổng quan</a>
    <a href="camera.html">📹 Giám sát</a>
    <a href="violations.html">🚫 Hồ sơ vi phạm</a>
    <a href="reports.html">📈 Báo cáo & thống kê</a>
    <a href="settings.html">⚙️ Cài đặt hệ thống</a>
</div>

<div class="main">
    <div class="header-flex">
        <h1>🚫 Quản lý hồ sơ vi phạm</h1>
        <button class="btn-search" style="background: #10b981;">+ Xuất báo cáo (Excel)</button>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <label>Tìm kiếm biển số</label>
            <input type="text" id="searchPlate" placeholder="VD: 29A-12345...">
        </div>
        <div class="filter-group">
            <label>Loại vi phạm</label>
            <select id="filterType">
                <option value="all">Tất cả loại lỗi</option>
                <option value="red_light">Vượt đèn đỏ</option>
                <option value="no_helmet">Không đội mũ bảo hiểm</option>
                <option value="wrong_lane">Đi sai làn đường</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Trạng thái</label>
            <select id="filterStatus">
                <option value="all">Tất cả trạng thái</option>
                <option value="pending">Chờ xử lý</option>
                <option value="verified">Đã xác minh</option>
                <option value="rejected">Đã hủy bỏ</option>
            </select>
        </div>
        <button class="btn-search" onclick="loadViolations()">🔍 Lọc dữ liệu</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Biển số</th>
                    <th>Loại vi phạm</th>
                    <th>Thời gian</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="violationBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    async function loadViolations() {
        try {
            const response = await fetch("http://127.0.0.1:5000/api/violations");
            let data = await response.json();

            data.sort((a, b) => (a.id || 0) - (b.id || 0));
            let html = "";
            data.forEach((v, index) => {
                // Logic badge trạng thái
                let statusClass = "badge-pending";
                let statusText = v.status || "Chờ xử lý";
                if(statusText.includes("Đã xác minh")) statusClass = "badge-success";
                if(statusText.includes("Hủy")) statusClass = "badge-error";

                html += `
                    <tr>
                        <td><b>${v.id ?? index + 1}</b></td>
                        <td><code style="background:#e2e8f0; padding:4px 8px; border-radius:4px; font-weight:bold;">${v.plate || v.vehicle_id || "N/A"}</code></td>
                        <td>${v.type || "N/A"}</td>
                        <td>${v.time || "---"}</td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <button class="btn-action" onclick="viewDetail(${v.id})">Chi tiết</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById("violationBody").innerHTML = html;

        } catch (error) {
            console.error("Lỗi:", error);
            // Dữ liệu mẫu nếu không kết nối được API
            document.getElementById("violationBody").innerHTML = `
                <tr>
                    <td colspan="7" style="padding:20px; color:gray;">Không thể kết nối API hoặc chưa có dữ liệu</td>
                </tr>
            `;
        }
    }

    function viewDetail(id) {
        alert("Xem chi tiết hồ sơ: #" + id);
    }

    document.addEventListener("DOMContentLoaded", loadViolations);
</script>

</body>
</html>
